workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main")'

variables:
  DOCKER_BUILDKIT: 1

stages:
  - build

build-and-push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker buildx create --use
    - docker buildx build
        --platform linux/386,linux/amd64,linux/arm/v7,linux/arm64/v8
        --tag $CI_REGISTRY_IMAGE:latest
        --push .
